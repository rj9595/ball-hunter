<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coin Hunter</title>

<style>

/* =========================
   🎨 استایل کلی صفحه
========================= */
body{
    font-family:tahoma;
    text-align:center;
    background:linear-gradient(135deg,#111,#333);
    color:white;
    margin:0;
    min-height:100vh;
}

/* =========================
   🎮 عنوان
========================= */
h1{
    margin:15px 0;
}

/* =========================
   📊 اطلاعات بازی
========================= */
#info{
    display:flex;
    justify-content:center;
    gap:15px;
    margin:10px;
    flex-wrap:wrap;
}

/* =========================
   🔘 دکمه‌ها
========================= */
button{
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#00c853;
    color:white;
}

/* =========================
   🎯 محیط بازی
========================= */
#game{
    width:90vw;
    max-width:500px;
    aspect-ratio:1/1;
    margin:10px auto;
    background:#222;
    border:3px solid white;
    border-radius:15px;
    position:relative;
    overflow:hidden;
}

/* =========================
   🪙 سکه
========================= */
.coin{
    width:40px;
    height:40px;
    border-radius:50%;
    position:absolute;
    cursor:pointer;
    background:gold;
}

/* =========================
   🪟 مودال اسم
========================= */
#nameModal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:flex;
    justify-content:center;
    align-items:center;
}

/* باکس مودال */
.modalBox{
    background:#111;
    padding:20px;
    border-radius:15px;
    width:260px;
}

/* input اسم */
.modalBox input{
    width:90%;
    padding:10px;
    border-radius:10px;
    border:none;
    text-align:center;
    margin:10px 0;
}

/* =========================
   🏆 لیدربورد
========================= */
#leaderboard{
    width:90%;
    max-width:500px;
    margin:10px auto;
    text-align:left;
    border:1px solid #444;
    border-radius:10px;
    padding:10px;
}

.lb-item{
    padding:5px;
    border-bottom:1px solid #333;
}

</style>
</head>

<body>

<h1>🎯 Coin Hunter</h1>

<!-- =========================
     📊 اطلاعات بازی
========================= -->
<div id="info">
<div>⭐ امتیاز: <span id="score">0</span></div>
<div>⏱ زمان: <span id="time">25</span></div>
<div>🏆 رکورد: <span id="highscore">0</span></div>
</div>

<button onclick="startGame()">شروع بازی</button>

<!-- 🎮 بازی -->
<div id="game"></div>

<!-- 🏆 لیدربورد -->
<div id="leaderboard">
<h3>🏆 Top Players</h3>
<div id="board"></div>
</div>

<!-- 🪟 مودال اسم -->
<div id="nameModal">
<div class="modalBox">
<h3>اسم خودتو وارد کن</h3>
<input id="nameInput" placeholder="Ali">
<button onclick="saveName()">ورود</button>
</div>
</div>

<script>

/* =========================
   🔥 تنظیمات Supabase
========================= */
const SUPABASE_URL = "https://dceqzskouoblluxrdgoi.supabase.co";
const SUPABASE_KEY = "sb_publishable_OaHzdHhVIezzn49Hf0LGkQ_rzvv7vWQ";

/* =========================
   📦 متغیرهای بازی
========================= */
let score = 0;
let timeLeft = 25;
let playerName = "";

/* المنت‌ها */
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");

/* تایمر */
let timerInterval;
let moveInterval;

/* =========================
   🏆 رکورد لوکال
========================= */
let highscore = localStorage.getItem("highscore") || 0;
document.getElementById("highscore").textContent = highscore;

/* =========================
   👤 ذخیره اسم بازیکن
========================= */
function saveName(){
    playerName = document.getElementById("nameInput").value;

    if(!playerName){
        alert("اسم وارد کن!");
        return;
    }

    localStorage.setItem("playerName", playerName);
    document.getElementById("nameModal").style.display = "none";
}

/* =========================
   💾 ارسال امتیاز به Supabase
========================= */
async function saveScoreToDB(){

    await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "apikey": SUPABASE_KEY,
            "Authorization": `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({
            player_name: playerName,
            score: score
        })
    });
}

/* =========================
   🪙 ساخت سکه
========================= */
function createCoin(){

    game.innerHTML = "";

    const coin = document.createElement("div");
    coin.classList.add("coin");

    moveCoin(coin);

    coin.onclick = function(){
        score++;
        scoreEl.textContent = score;
        createCoin();
    };

    game.appendChild(coin);

    clearInterval(moveInterval);

    moveInterval = setInterval(()=>{
        moveCoin(coin);
    },800);
}

/* =========================
   📍 حرکت سکه
========================= */
function moveCoin(coin){
    coin.style.left = Math.random()*90 + "%";
    coin.style.top = Math.random()*90 + "%";
}

/* =========================
   🏆 گرفتن لیدربورد
========================= */
async function loadLeaderboard(){

    const res = await fetch(
        `${SUPABASE_URL}/rest/v1/scores?select=*&order=score.desc&limit=10`,
        {
            headers:{
                "apikey": SUPABASE_KEY,
                "Authorization": `Bearer ${SUPABASE_KEY}`
            }
        }
    );

    const data = await res.json();

    const board = document.getElementById("board");
    board.innerHTML = "";

    data.forEach((p, i)=>{
        const div = document.createElement("div");
        div.classList.add("lb-item");
        div.innerText = `${i+1}. ${p.player_name} - ${p.score}`;
        board.appendChild(div);
    });
}

/* =========================
   ▶️ شروع بازی
========================= */
function startGame(){

    playerName = localStorage.getItem("playerName");

    if(!playerName){
        document.getElementById("nameModal").style.display = "flex";
        return;
    }

    score = 0;
    timeLeft = 25;

    scoreEl.textContent = 0;
    timeEl.textContent = 25;

    createCoin();

    clearInterval(timerInterval);

    timerInterval = setInterval(()=>{

        timeLeft--;
        timeEl.textContent = timeLeft;

        if(timeLeft <= 0){

            clearInterval(timerInterval);
            clearInterval(moveInterval);

            game.innerHTML = "";

            if(score > highscore){
                highscore = score;
                localStorage.setItem("highscore", score);
                document.getElementById("highscore").textContent = score;
            }

            /* ارسال به دیتابیس */
            saveScoreToDB();

            /* آپدیت لیدربورد */
            loadLeaderboard();

            alert(`🎮 بازی تموم شد!\nاسم: ${playerName}\nامتیاز: ${score}`);
        }

    },1000);
}

/* =========================
   🚀 لود اولیه صفحه
========================= */
window.onload = function(){
    playerName = localStorage.getItem("playerName");
    loadLeaderboard();
}

</script>

</body>
</html>
